<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Para vos ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9eb5, #ffc7d7);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .card {
      background: rgba(255,255,255,0.15);
      padding: 40px;
      border-radius: 25px;
      text-align: center;
      backdrop-filter: blur(10px);
      color: white;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      max-width: 500px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
    }

    .heart {
      font-size: 3rem;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1);
      }
    }

    .small {
      margin-top: 20px;
      opacity: 0.8;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="heart">❤️</div>

    <h1>Feliz primer año</h1>

    <p>
      Estamos trabajando en algo especial...
      <br><br>
      Porque una historia tan linda merece su propia página.
    </p>

    <div class="small">
      Hecho con amor por nosotros ✨
    </div>
  </div>
</body>
</html>
